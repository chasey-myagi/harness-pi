name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  ci:
    runs-on: ubuntu-latest

    # 真 Postgres service：让 packages/adapters 那 18 个 env-gated 集成测试在 CI 真跑（pg-mem 与真 PG
    # 有已知偏差，单链路靠模拟器背书不够）。POSTGRES_TEST_URL 一设，integration 测试就从 skip 转为执行。
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: harness_pi_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      POSTGRES_TEST_URL: postgres://postgres:test@localhost:5432/harness_pi_test

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      # build 必须先于 typecheck/test：coding-agent 等下游按各包的**已构建 dist** 做类型检查与跨包导入。
      - name: Build
        run: pnpm -r build

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test
        run: pnpm -r test
