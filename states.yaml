states:
  new_issue:
    owner: requester
    next:
      - needs_info
      - duplicate
      - security_private
      - triaged
  needs_info:
    owner: requester
    next:
      - triaged
      - abandoned
  duplicate:
    owner: maintainer
    next: []
  security_private:
    owner: maintainer
    next: []
  abandoned:
    owner: maintainer
    next: []
  triaged:
    owner: maintainer
    next:
      - ready_to_spec
      - ready_to_implement
      - reserved_internal
  reserved_internal:
    owner: maintainer
    next: []
  ready_to_spec:
    owner: contributor_or_agent
    next:
      - spec_pr_open
  spec_pr_open:
    owner: contributor_or_agent
    next:
      - spec_review
  spec_review:
    owner: maintainer
    next:
      - spec_approved
      - needs_info
  spec_approved:
    owner: maintainer
    next:
      - ready_to_implement
  ready_to_implement:
    owner: contributor_or_agent
    next:
      - impl_pr_open
  impl_pr_open:
    owner: contributor_or_agent
    next:
      - agent_review
      - human_review
  agent_review:
    owner: agent
    next:
      - human_review
  human_review:
    owner: maintainer
    next:
      - ci_green
      - needs_info
  ci_green:
    owner: ci
    next:
      - merge_ready
  merge_ready:
    owner: maintainer
    next:
      - merged
  merged:
    owner: maintainer
    next:
      - release_note_drafted
  release_note_drafted:
    owner: maintainer
    next: []
